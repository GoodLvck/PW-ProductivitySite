services:
  web:
    build:
      context: ./ProductivitySite
      dockerfile: Dockerfile
    container_name: productivitysite-web
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-dev-only-key}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DJANGO_LANGUAGE_CODE: ${DJANGO_LANGUAGE_CODE:-en-us}
      DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-UTC}
      DJANGO_USE_I18N: ${DJANGO_USE_I18N:-true}
      DJANGO_USE_TZ: ${DJANGO_USE_TZ:-true}
      DJANGO_STATIC_URL: ${DJANGO_STATIC_URL:-/static/}
      DJANGO_LOGIN_REDIRECT_URL: ${DJANGO_LOGIN_REDIRECT_URL:-/}
      DJANGO_LOGOUT_REDIRECT_URL: ${DJANGO_LOGOUT_REDIRECT_URL:-/}
      DJANGO_DEFAULT_FROM_EMAIL: ${DJANGO_DEFAULT_FROM_EMAIL:-no-reply@localhost}
      DJANGO_NOTIFY_EMAIL: ${DJANGO_NOTIFY_EMAIL:-admin@localhost}
      SQLITE_PATH: /data/db.sqlite3
    ports:
      - "${APP_PORT:-8080}:8000"
    volumes:
      - productivitysite_data:/data
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

volumes:
  productivitysite_data:
