<!-- templates/base.html -->

{% load static %}  <!-- activates the 'static' tag for loading CSS, images, etc. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'productivity_site/style.css' %}">  <!-- generates /static/blog/style.css -->
    <title>{% block title %}My Site{% endblock %}</title>  <!-- child templates override this -->
</head>
<body>
    <nav>
        <a href="{% url 'productivity_site:home' %}">Home</a>  <!-- 'url' generates "/" from the URL name -->
    </nav>

    <div class="container">
        {% block content %}{% endblock %}  <!-- each page fills this block with its own content -->
    </div>

    <footer>
        <p>Django Blog - 2026</p>
    </footer>
</body>
</html>
